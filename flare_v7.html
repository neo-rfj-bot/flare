<!-- Splash screen background color -->
<style>
  html { background: #0d0d0f; }
  /* Hide address bar on scroll -->
  body { min-height: 100.1vh; }
  /* Safe area for iPhone notch/home bar -->
  #welcome, #setup, #game, #transition, #endscreen {
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
  }
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surf:#161618;--surf2:#1e1e22;--surf3:#28282e;
  --bdr:#2e2e36;--txt:#f0eee8;--muted:#7a7880;--acc:#e8512a;--acc2:#f07040;
  --l1:#4a9eff;--l2:#f07040;--l3:#c44fff;--l4:#e84a6a;
  --l1bg:#0a1a30;--l2bg:#2a1508;--l3bg:#1a0828;--l4bg:#280818;
}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
#welcome{align-items:center;justify-content:center;gap:1.75rem;padding:2rem 1.5rem;text-align:center}
.logo h1{font-size:3rem;font-weight:800;letter-spacing:.06em}
.logo h1 span{color:var(--acc)}
.logo p{color:var(--muted);font-size:.8rem;margin-top:.3rem;letter-spacing:.12em;text-transform:uppercase}
.sec-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;text-align:center}
.level-grid{display:flex;gap:.6rem;width:100%;max-width:380px}
.lv-opt{flex:1;border-radius:14px;padding:1rem .4rem;text-align:center;cursor:pointer;border:1.5px solid var(--bdr);background:var(--surf);transition:all .2s;-webkit-user-select:none;user-select:none}
.lv-opt:active{transform:scale(0.97)}
.lv-name{font-size:.88rem;font-weight:700;margin-bottom:.2rem}
.lv-desc{font-size:.65rem;color:var(--muted)}
.lv-opt.sel-1{border-color:var(--l1);background:var(--l1bg)}
.lv-opt.sel-2{border-color:var(--l2);background:var(--l2bg)}
.lv-opt.sel-3{border-color:var(--l3);background:var(--l3bg)}
.lv-opt.sel-4{border-color:var(--l4);background:var(--l4bg)}
.big-btn{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:1rem;font-size:1rem;font-weight:600;cursor:pointer;width:100%;max-width:380px;transition:all .2s;display:block;-webkit-user-select:none;user-select:none}
.big-btn:active{background:var(--acc2);transform:scale(0.98)}
.big-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
#setup{padding:1.5rem 1rem 2rem;gap:1.1rem}
.back-btn{background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;padding:.25rem 0;text-align:left}
.page-title{font-size:1.35rem;font-weight:700}
.page-sub{font-size:.82rem;color:var(--muted);margin-top:.15rem}
.plist{display:flex;flex-direction:column;gap:.55rem}
.prow{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:.7rem 1rem;display:flex;align-items:center;gap:.65rem}
.pav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.pi{flex:1;min-width:0}
.pn{font-size:.92rem;font-weight:500}
.pm{font-size:.72rem;color:var(--muted);margin-top:.1rem}
.rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;opacity:.5;line-height:1;padding:.25rem}
.rm:active{opacity:1;color:#e24b4a}
.add-row{background:var(--surf);border:1px dashed var(--bdr);border-radius:12px;padding:.9rem;text-align:center;cursor:pointer;color:var(--muted);font-size:.9rem;transition:border-color .2s;-webkit-user-select:none;user-select:none}
.add-row:active{border-color:var(--acc);color:var(--acc)}
.start-row{margin-top:auto;padding-top:.5rem}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--surf2);border:1px solid var(--bdr);border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:500px}
.modal h3{font-size:1.05rem;font-weight:600;margin-bottom:1.1rem}
.fld{margin-bottom:.9rem}
.fld label{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.fld input{width:100%;background:var(--surf3);border:1px solid var(--bdr);border-radius:10px;padding:.75rem .9rem;color:var(--txt);font-size:1rem;outline:none;-webkit-appearance:none}
.fld input:focus{border-color:var(--acc)}
.chips{display:flex;gap:.45rem;flex-wrap:wrap}
.chip{background:var(--surf3);border:1px solid var(--bdr);border-radius:20px;padding:.42rem .9rem;font-size:.82rem;cursor:pointer;color:var(--muted);-webkit-user-select:none;user-select:none;transition:all .15s}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.mact{display:flex;gap:.65rem;margin-top:1.2rem}
.mbtn{border-radius:12px;padding:.8rem 1.1rem;font-size:.95rem;font-weight:500;cursor:pointer;border:none;flex:1;-webkit-user-select:none;user-select:none}
.mp{background:var(--acc);color:#fff}
.mp:active{background:var(--acc2)}
.ms{background:var(--surf3);color:var(--txt);border:1px solid var(--bdr)}
.ms:active{border-color:var(--acc);color:var(--acc)}
#transition{align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;gap:1.5rem}
.tr-icon{font-size:3rem}
.tr-msg{font-size:1.05rem;line-height:1.7;color:var(--txt);max-width:320px;font-weight:500}
.tr-sub{font-size:.85rem;color:var(--muted)}
#game{padding:1rem 1rem 1.5rem;gap:0}
.ghdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.glogo{font-size:1.05rem;font-weight:800;letter-spacing:.06em}
.glogo span{color:var(--acc)}
.lbadge{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .75rem;border-radius:20px;border:1px solid}
.lb1{background:var(--l1bg);color:var(--l1);border-color:var(--l1)}
.lb2{background:var(--l2bg);color:var(--l2);border-color:var(--l2)}
.lb3{background:var(--l3bg);color:var(--l3);border-color:var(--l3)}
.lb4{background:var(--l4bg);color:var(--l4);border-color:var(--l4)}
.strip{display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;padding-bottom:.2rem}
.strip::-webkit-scrollbar{display:none}
.pchip{background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:.25rem .7rem;font-size:.78rem;white-space:nowrap;flex-shrink:0;color:var(--muted)}
.pchip.cur{border-color:var(--acc);color:var(--acc);background:rgba(232,81,42,.12);font-weight:600}
.turn-bar{text-align:center;margin:.9rem 0 .6rem}
.tl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
.tn{font-size:1.5rem;font-weight:800}
.prog{display:flex;align-items:center;justify-content:center;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem;min-height:16px}
.prog-dot{width:7px;height:7px;border-radius:50%;background:var(--surf3);transition:all .3s;flex-shrink:0}
.prog-dot.done{background:var(--muted)}
.prog-dot.cur{background:var(--acc);transform:scale(1.4)}
.card-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;padding-bottom:1rem}
.dare-card{width:100%;max-width:420px;border-radius:18px;overflow:hidden;border:1px solid var(--bdr);background:var(--surf)}
.chdr{padding:.75rem 1.1rem;display:flex;align-items:center;justify-content:space-between}
.chdr.l1{background:var(--l1bg);border-bottom:1px solid var(--l1)}
.chdr.l2{background:var(--l2bg);border-bottom:1px solid var(--l2)}
.chdr.l3{background:var(--l3bg);border-bottom:1px solid var(--l3)}
.chdr.l4{background:var(--l4bg);border-bottom:1px solid var(--l4)}
.chdr-who{font-size:.95rem;font-weight:700}
.l1 .chdr-who{color:var(--l1)}.l2 .chdr-who{color:var(--l2)}.l3 .chdr-who{color:var(--l3)}.l4 .chdr-who{color:var(--l4)}
.chdr-right{font-size:.68rem;color:var(--muted)}
.cbody{padding:1.1rem 1.1rem}
.cslbl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:.35rem}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.style.display='none';s.classList.remove('active');});
  var el=document.getElementById(id);
  el.style.display='flex';
  el.classList.add('active');
  window.scrollTo(0,0);
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function pickLevel(n){
  startLevel=n;
  document.querySelectorAll('.lv-opt').forEach(function(e){
    e.className='lv-opt';
  });
  document.getElementById('lopt'+n).classList.add('sel-'+n);
  document.getElementById('toSetupBtn').disabled=false;
}

function goSetup(){showScreen('setup');}

function getPartnerWeight(activeIdx, candidateIdx){
  var activePair=Math.floor(activeIdx/2);
  var candidatePair=Math.floor(candidateIdx/2);
  var crossCouple=(activePair!==candidatePair);
  var oppositeGender=(players[activeIdx].gender!==players[candidateIdx].gender);
  if(crossCouple&&oppositeGender) return 6; // M+F cross-couple — most common
  if(crossCouple&&!oppositeGender) return 3; // F+F cross-couple — second
  return 1; // same couple — least common
}

function renderPlayers(){
  var html='';
  for(var i=0;i<players.length;i++){
    var p=players[i];
    html+='<div class="prow"><div class="pav" style="background:'+p.color+'22;color:'+p.color+'">'+p.name.charAt(0).toUpperCase()+'</div><div class="pi"><div class="pn">'+p.name+'</div><div class="pm">'+cap(p.gender)+' · into '+p.prefs+'</div></div><button class="rm" onclick="removeP('+i+')">×</button></div>';
  }
  document.getElementById('plist').innerHTML=html;
  document.getElementById('startBtn').disabled=(players.length<2);
  // Silent couple pairing: 1+2 are couple, 3+4 are couple, odd player is free agent
  playingAsCouples=(players.length>=2);
}

function removeP(i){players.splice(i,1);renderPlayers();}

function openModal(){
  modalGender=null;
  modalPrefs='everyone';
  document.getElementById('nameIn').value='';
  document.querySelectorAll('#gChips .chip').forEach(function(c){c.classList.remove('on');});
  document.querySelectorAll('#pChips .chip').forEach(function(c){
    c.classList.remove('on');
    if(c.getAttribute('data-v')==='everyone') c.classList.add('on');
  });
  document.getElementById('ov').classList.add('open');
  setTimeout(function(){document.getElementById('nameIn').focus();},100);
}

function closeModal(){document.getElementById('ov').classList.remove('open');}

function pickChip(type,el){
  var chips=el.parentElement.querySelectorAll('.chip');
  chips.forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
  if(type==='g') modalGender=el.getAttribute('data-v');
  else modalPrefs=el.getAttribute('data-v');
}

function addPlayer(){
  var name=document.getElementById('nameIn').value.trim();
  if(!name||!modalGender){alert('Please enter a name and select a gender.');return;}
  players.push({name:name,gender:modalGender,prefs:modalPrefs,color:COLORS[players.length%COLORS.length]});
  closeModal();
  renderPlayers();
}

document.getElementById('ov').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal();});
document.getElementById('addRowBtn').addEventListener('click',openModal);

document.querySelectorAll('#gChips .chip').forEach(function(chip){
  chip.addEventListener('click',function(){pickChip('g',this);});
});
document.querySelectorAll('#pChips .chip').forEach(function(chip){
  chip.addEventListener('click',function(){pickChip('p',this);});
});

function compatible(activeIdx){
  var a=players[activeIdx];
  var result=[];
  for(var i=0;i<players.length;i++){
    if(i===activeIdx) continue;
    var p=players[i];
    var aw=a.prefs,pw=p.prefs;
    var aW=(aw==='everyone'||(aw==='males'&&p.gender==='male')||(aw==='females'&&p.gender==='female'));
    var pW=(pw==='everyone'||(pw==='males'&&a.gender==='male')||(pw==='females'&&a.gender==='female'));
    if(aW&&pW) result.push({player:p,idx:i});
  }
  return result;
}

function cardCompatible(card,activeIdx){
  var gc=card.gc||{};
  if(gc['A']&&players[activeIdx].gender!==gc['A']) return false;
  // Get all compatible partners for active player
  var compat=compatible(activeIdx);
  var needed=card.n-1;
  if(compat.length<needed) return false;
  var slots=['B','C','D','E','F'];
  // Count how many of each gender are needed and available
  var neededGenders={};
  for(var i=0;i<slots.length;i++){
    var slot=slots[i];
    if(gc[slot]){
      neededGenders[gc[slot]]=(neededGenders[gc[slot]]||0)+1;
    }
  }
  for(var g in neededGenders){
    var available=0;
    for(var j=0;j<compat.length;j++){
      if(compat[j].player.gender===g) available++;
    }
    // For parallel-actor cards (e.g. A&B both act on C), also count active player
    if(players[activeIdx].gender===g) available++;
    if(available<neededGenders[g]) return false;
  }
  return true;
}

function weightedPick(cands,activeIdx){
  if(!cands.length) return null;
  var weights=cands.map(function(x){return getPartnerWeight(activeIdx,x.idx);});
  var total=weights.reduce(function(a,b){return a+b;},0);
  var r=Math.random()*total,cum=0;
  for(var i=0;i<cands.length;i++){cum+=weights[i];if(r<=cum)return cands[i];}
  return cands[cands.length-1];
}

function assignPartners(card,activeIdx){
  var compat=compatible(activeIdx);
  var gc=card.gc||{};
  var assigned={A:players[activeIdx]};
  var slots=SLOTS.slice(1,card.n);
  var used=[];
  for(var i=0;i<slots.length;i++){
    var slot=slots[i];
    if(gc[slot]){
      var cands=compat.filter(function(x){return used.indexOf(x.idx)<0&&x.player.gender===gc[slot];});
      if(cands.length){var pick=weightedPick(cands,activeIdx);assigned[slot]=pick.player;used.push(pick.idx);}
    }
  }
  var activGender=players[activeIdx].gender;
  for(var i=0;i<slots.length;i++){
    var slot=slots[i];
    if(!assigned[slot]){
      var cands=compat.filter(function(x){return used.indexOf(x.idx)<0;});
      if(cands.length){
        var weighted=cands.map(function(x){var w=getPartnerWeight(activeIdx,x.idx);return {x:x,w:w};});
        var total=weighted.reduce(function(a,b){return a+b.w;},0);
        var r=Math.random()*total,cum=0,pick=weighted[weighted.length-1].x;
        for(var j=0;j<weighted.length;j++){cum+=weighted[j].w;if(r<=cum){pick=weighted[j].x;break;}}
        assigned[slot]=pick.player;used.push(pick.idx);
      }
    }
  }
  return assigned;
}

function startGame(){
  currentLevel=startLevel;
  currentTurn=0;
  cardsDrawnThisLevel=0;
  totalCardsNeeded=players.length*CARDS_PER_LEVEL[currentLevel];
  usedCardIds={};
  showScreen('game');
  renderGame();
}

function drawCard(){
  var lv=currentLevel;
  var levelCards=CARDS[String(lv)];
  var pool=[];
  // Track which variant groups have been used
  var usedVariants={};
  for(var id in usedCardIds){
    var usedCard=null;
    for(var j=0;j<levelCards.length;j++){if(levelCards[j].id==id){usedCard=levelCards[j];break;}}
    if(usedCard){
      var vg=usedCard.variant_of||usedCard.id;
      usedVariants[vg]=true;
      for(var j=0;j<levelCards.length;j++){
        var vc=levelCards[j];
        var vcg=vc.variant_of||vc.id;
        if(vcg===vg) usedVariants[vcg]=true;
      }
    }
  }
  for(var i=0;i<levelCards.length;i++){
    var c=levelCards[i];
    var vg=c.variant_of||c.id;
    if(!usedCardIds[c.id]&&!usedVariants[vg]&&cardCompatible(c,currentTurn)) pool.push(c);
  }

  // Pinned cards: #168 (Level 2) and #169 (Level 3) must always appear
  // Force them in the middle of their level (after 40% of cards drawn, before 80%)
  // Pinned cards: #168 (Level 2) and #169 (Level 3) must always appear
  // #168: between card 5 and card 13 of Level 2
  // #169: between card 5 and card 8 of Level 3
  // Pinned cards: guaranteed to appear in their window
  // #168: Level 2, cards 5-13
  // #169: Level 3, cards 5-8
  // #172: Level 2, last 3 cards, only when active player is male
  var pinnedIds={2:168, 3:169};
  var pinnedFrom={2:4, 3:4};
  var pinnedBefore={2:13, 3:8};
  var pinnedId=pinnedIds[lv];
  if(pinnedId){
    var drawn=cardsDrawnThisLevel;
    var pinnedNotYetUsed=!usedCardIds[pinnedId];
    var pinnedCard=null;
    for(var i=0;i<levelCards.length;i++){if(levelCards[i].id===pinnedId){pinnedCard=levelCards[i];break;}}
    if(pinnedNotYetUsed&&pinnedCard&&cardCompatible(pinnedCard,currentTurn)){
      if(drawn>=pinnedBefore[lv]){
        pool=[pinnedCard];
      } else if(drawn>=pinnedFrom[lv]&&Math.random()<0.4){
        pool=[pinnedCard];
      }
    }
  }
  // Pin #172 to last 3 cards of Level 2, male active player only
  if(lv===2&&!usedCardIds[172]&&players[currentTurn].gender==='male'){
    var drawn172=cardsDrawnThisLevel;
    var total172=totalCardsNeeded;
    var card172=null;
    for(var i=0;i<levelCards.length;i++){if(levelCards[i].id===172){card172=levelCards[i];break;}}
    if(card172&&cardCompatible(card172,currentTurn)){
      if(drawn172>=total172-3){
        pool=[card172];
      } else if(drawn172>=total172-5&&Math.random()<0.35){
        pool=[card172];
      }
    }
  }
  var wrap=document.getElementById('cardWrap');
  if(!pool.length){
    wrap.innerHTML='<div class="no-match"><p>No suitable cards for <strong>'+players[currentTurn].name+'</strong> right now.</p></div><button class="ghost-btn" onclick="advanceTurn()">Skip →</button>';
    return;
  }
  var card=pool[Math.floor(Math.random()*pool.length)];
  usedCardIds[card.id]=true;
  var assigned=assignPartners(card,currentTurn);
  var nhc='nh'+lv;
  function fmt(str){
    // Resolve pronoun tokens like {A:their} -> his/her
    str=str.replace(/\{([A-F]):([a-z]+)\}/g,function(m,slot,token){
      var p=assigned[slot];
      if(!p) return token;
      var f=(p.gender==='female');
      var pronouns={'their':f?'her':'his','them':f?'her':'him','they':f?'she':'he','themselves':f?'herself':'himself'};
      return pronouns[token]||token;
    });
    // Resolve name tokens {A} -> highlighted name
    return str.replace(/\{([A-F])\}/g,function(m,s){
      return assigned[s]?'<span class="nh '+nhc+'">'+assigned[s].name+'</span>':m;
    });
  }
  var timerHtml='';
  if(card.timer){
    var circ=(2*Math.PI*28).toFixed(2);
    timerHtml='<div class="timer-wrap"><div class="timer-ring"><svg width="68" height="68" viewBox="0 0 68 68"><circle class="tr-bg" cx="34" cy="34" r="28"/><circle class="tr-fg" id="trCircle" cx="34" cy="34" r="28" stroke-dasharray="'+circ+'" stroke-dashoffset="0"/></svg><div class="timer-num" id="timerNum">'+card.timer+'</div></div><button class="timer-start-btn" id="timerBtn" onclick="startTimer('+card.timer+')">Start timer</button></div>';
  }
  var skipLabel=skipCount<1?'Skip — try another':'Must accept this one';
  wrap.innerHTML='<div class="dare-card card-reveal"><div class="chdr l'+lv+'"><div class="chdr-who">'+players[currentTurn].name+', do you dare?</div><div class="chdr-right">Level '+lv+'</div></div><div class="cbody"><div class="cslbl lbl'+lv+'">Challenge</div><div class="ctxt">'+fmt(card.c)+'</div><div class="cslbl lbl'+lv+'">Position</div><div class="cpos">'+fmt(card.p)+'</div>'+timerHtml+'</div></div><button class="act-btn" style="margin-top:.5rem" onclick="advanceTurn()">Accepted and done</button><button class="ghost-btn" onclick="skipCard()">'+skipLabel+'</button>';
}

function skipCard(){
  if(skipCount>=1){return;}
  stopTimer();
  skipCount=1;
  // Re-draw a new card for the same player
  drawCard();
}

function advanceTurn(){
  stopTimer();
  skipCount=0;
  cardsDrawnThisLevel++;
  currentTurn=(currentTurn+1)%players.length;
  if(cardsDrawnThisLevel>=totalCardsNeeded){showTransition(currentLevel);return;}
  renderGame();
}

function showTransition(completedLevel){
  if(completedLevel>=4){
    document.getElementById('endMsg').textContent=TRANSITIONS[4].msg;
    showScreen('endscreen');return;
  }
  var tr=TRANSITIONS[completedLevel];
  document.getElementById('trIcon').textContent=tr.icon;
  document.getElementById('trMsg').textContent=tr.msg;
  document.getElementById('trSub').textContent=tr.sub;
  document.getElementById('trBtn').textContent=tr.btn;
  nextLevelAfterTransition=completedLevel+1;
  showScreen('transition');
}

function continueAfterTransition(){
  currentLevel=nextLevelAfterTransition;
  cardsDrawnThisLevel=0;
  totalCardsNeeded=players.length*CARDS_PER_LEVEL[currentLevel];
  usedCardIds={};
  showScreen('game');
  renderGame();
}

function startTimer(total){
  if(timerRunning) return;
  timerRunning=true;
  var left=total;
  var circ=2*Math.PI*28;
  var btn=document.getElementById('timerBtn');
  if(btn) btn.classList.add('running');
  timerInterval=setInterval(function(){
    left--;
    var num=document.getElementById('timerNum');
    var circle=document.getElementById('trCircle');
    if(num) num.textContent=left;
    if(circle) circle.style.strokeDashoffset=(circ*(1-left/total)).toFixed(2);
    if(left<=0){stopTimer();if(num)num.textContent='✓';}
  },1000);
}

function stopTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=null;timerRunning=false;
}
</script>
</body>
</html>
